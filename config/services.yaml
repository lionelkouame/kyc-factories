# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # Bindings ports → adaptateurs concrets
    App\Domain\KycRequest\Port\DocumentStoragePort:
        class: App\Infrastructure\Storage\InMemoryDocumentStorage

    App\Domain\KycRequest\Port\DomainEventPublisherPort:
        class: App\Infrastructure\Messaging\InMemoryDomainEventPublisher

    App\Domain\KycRequest\Port\OcrPort:
        class: App\Infrastructure\Ocr\StubOcrAdapter

    App\Application\Projection\KycRequestStatusProjectorPort:
        class: App\Infrastructure\Projection\InMemoryKycRequestStatusProjector

    App\Application\Projection\KycAuditTrailProjectorPort:
        class: App\Infrastructure\Projection\InMemoryKycAuditTrailProjector

    App\Application\Projection\PendingManualReviewProjectorPort:
        class: App\Infrastructure\Projection\InMemoryPendingManualReviewProjector

    App\Application\Projection\KycDecisionReportProjectorPort:
        class: App\Infrastructure\Projection\InMemoryKycDecisionReportProjector

    App\Application\Port\CommandBusPort:
        class: App\Infrastructure\Bus\SymfonyMessengerCommandBus

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
