security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        users_in_memory:
            memory:
                users:
                    kyc_auditor:
                        # Production: set KYC_AUDITOR_PASSWORD_HASH to a proper bcrypt hash.
                        password: '%env(KYC_AUDITOR_PASSWORD_HASH)%'
                        roles: ['ROLE_KYC_AUDITOR']

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            stateless: true
            provider: users_in_memory
            http_basic: ~

    # Only the first matching rule applies
    access_control:
        - { path: ^/api/kyc/.+/document$, roles: ROLE_KYC_AUDITOR, methods: [GET] }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
        providers:
            users_in_memory:
                memory:
                    users:
                        kyc_auditor:
                            # bcrypt("password", cost=4) — for tests only
                            password: '$2y$04$usesomesillystringfore2uDLvp1Ii2e./U9C8sBjqp8I90dH6hi'
                            roles: ['ROLE_KYC_AUDITOR']
                        basic_user:
                            password: '$2y$04$usesomesillystringfore2uDLvp1Ii2e./U9C8sBjqp8I90dH6hi'
                            roles: ['ROLE_USER']
